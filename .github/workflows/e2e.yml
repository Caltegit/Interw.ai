name: Tests E2E Playwright

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright sur preview Lovable
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Installer le navigateur Chromium pour Playwright
        run: npx playwright install --with-deps chromium

      - name: Lancer les tests E2E
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_BASE_URL: https://id-preview--d507061f-79c5-4010-a44e-dcd95586a736.lovable.app
        run: npx playwright test

      - name: Conserver le rapport HTML (uniquement en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Conserver vidéos, captures et traces (uniquement en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
